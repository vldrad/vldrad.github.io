<!DOCTYPE html>
<html>
<head>
    <title>MY PHOTOS</title>
    <meta http-equiv="content-type" content="text/html" charset="utf-8"/>
    <meta name="keywords" content="photos, test"/>
    <meta name="description" content="Page with photo files"/>
    <link rel="shortcut icon" type="image/png" href="photo.png"/>
    <link rel="stylesheet" type="text/css" href="css/style.css"/>
</head>
<body>
    <p><a href="index.html"><img title="Main page" alt="Main page" src="image/main.png" height="35" width="35"/></a></p>
    <h2 class="vmax2">On this page i want to show you some of my photos</h2>
    <p class="canclick">You can click on photo to read some information about that animal!</p>
    <div class="pics">
        <div class="pics_1_2">
            <div class="picture">
                <a href="https://en.wikipedia.org/wiki/Shark" target="_blank"><img src="./image/1.jpg" alt="Shark" title="Hammerhead shark, very scary!" height="250" width="400"/></a>
            </div>
            <div class="picture">
                <a href="https://en.wikipedia.org/wiki/Jellyfish" target="_blank"><img src="./image/2.jpg" alt="Jellyfish" title="So beautiful jellyfish,no?" height="250" width="400"/></a>
            </div>
        </div>
        <div class="pics_3_4">
            <div class="picture">
                <a href="https://en.wikipedia.org/wiki/Octopus" target="_blank"><img src="./image/3.jpg" alt="Octopus" title="Octopus here, where is Sponge Bob?" height="250" width="400"/></a>
            </div>
            <div class="picture">
                <a href="https://en.wikipedia.org/wiki/Turtle" target="_blank"><img src="./image/4.jpg" alt="Turtle" title="I think this turtle is hungry)" height="250" width="400"/></a>
            </div>
        </div>
    </div>
    <fieldset>
    <legend><b>What pictures do you like? Tell me , please!</b></legend>
    <p>
        <form target="GET">
            <div class="vid_rate">
                <div class="vid_check">
                    <label for="shark">Scary shark</label>
                    <input type="checkbox" name="photos" id="shark"/>
                </div>
                <div class="vid_check">
                    <label for="jellyfish">Beautiful jellyfish</label>
                    <input type="checkbox" name="photos" id="jellyfish"/>
                </div>
                <div class="vid_check">
                    <label for="octopus">Chilling octopus</label>
                    <input type="checkbox" name="photos" id="octopus"/>
                </div>
                <div class="vid_check">
                    <label for="turtle">Hungry turtle</label>
                    <input type="checkbox" name="photos" id="turtle"/>
                </div>
                <div style="margin:20px">
                    <input type="submit" value="SEND"/>
                    <input type="reset" value="RESET"/>
                </div>
            </div>
        </form>
    </p>

    </fieldset>

</body>
</html>
