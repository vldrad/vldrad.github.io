<!DOCTYPE html>
<html>
<head>
    <title>MUSIC GAME</title>
    <meta http-equiv="content-type" content="text/html" charset="utf-8"/>
    <meta name="keywords" content="audio, test"/>
    <meta name="description" content="Page with audio files"/>
    <link rel="shortcut icon" type="image/png" href="audio.png"/>
    <link rel="stylesheet" type="text/css" href="css/style.css"/>
</head>
<body>
    <p><a href="index.html"><img title="Main page" alt="Main page" src="image/main.png" height="35" width="35"/></a></p>
    <h2 class="vmax2">On this page we will play a little game!</h2>
    <fieldset>
    <legend><b>Lets check how good you are in knowledge about old good songs! Listen to each composition and try to write name and author!</b></legend>
        <div class="mgame">
            <label><b>First song:</b></label>
            <br />
            <audio controls="controls">
                <source src="audio/1.mp3" type="audio/mp3"/>
                <source src="audio/1.ogg" type="audio/ogg"/>
                <source src="audio/1.wav" type="audio/wav"/>
            </audio>
            <br />
            <form target="GET">
                <p>
                    <label>Name of song:</label>
                    <input type="text"/>
                </p>
                <p>
                    <label>Name of author:</label>
                    <input type="text"/>
                </p>
            </form>
        </div>
        <div class="mgame">
            <label><b>Second song:</b></label>
            <br />
            <audio controls="controls">
                <source src="audio/2.mp3" type="audio/mp3"/>
                <source src="audio/2.ogg" type="audio/ogg"/>
                <source src="audio/2.wav" type="audio/wav"/>
            </audio>
            <br />
            <form target="GET">
                <p>
                    <label>Name of song:</label>
                    <input type="text"/>
                </p>
                <p>
                    <label>Name of author:</label>
                    <input type="text"/>
                </p>
            </form>
        </div>
        <div class="mgame">
            <label><b>Third song:</b></label>
            <br />
            <audio controls="controls">
                <source src="audio/3.mp3" type="audio/mp3"/>
                <source src="audio/3.ogg" type="audio/ogg"/>
                <source src="audio/3.wav" type="audio/wav"/>
            </audio>
            <br />
            <form target="GET">
                <p>
                    <label>Name of song:</label>
                    <input type="text"/>
                </p>
                <p>
                    <label>Name of author:</label>
                    <input type="text"/>
                </p>
            </form>
        </div>
    </fieldset>
    <div style="text-align: center;">
        <fieldset>
        <legend><b>What song do you like the most?</b></legend>
            <div class="m_rates">
                <select>
                    <option>First one</option>
                    <option>Second one</option>
                    <option>Third one</option>
                </select>
            </div>
            <div class="m_rates">
                <input type="submit" value="SEND"/>
                <input type="reset" value="RESET"/>
            </div>
        </fieldset>
    </div>
</body>
</html>
